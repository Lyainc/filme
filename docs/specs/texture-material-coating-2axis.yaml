    - "src/utils/textureRecipes.ts — 레시피를 재질(noise+색필터)/코팅(gradient)로 축 분류, 축별 defaultIntensity"
    - "src/components/moods/_shared.tsx — Poster / TextureOverlay(2겹 렌더) / TEXTURE_FILTERS(재질 색필터) / defaultBrightnessForTexture / data-texture 속성(축별로 확장)"
