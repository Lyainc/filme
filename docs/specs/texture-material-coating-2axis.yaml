    - "src/hooks/usePhototicket.ts — components 상태 4필드화(material/coating/materialIntensity/coatingIntensity), 축별 기본강도 리셋, undo/임시저장 원자 복원 스냅샷 확장"
    - "src/components/v2/DesignRail.tsx · DesktopDesignPanel.tsx — 재질/코팅 피커 각 섹션 + 각 축 강도 슬라이더(BrightnessSlider 재사용)"
    - "src/types/index.ts — TicketComponents에 material/coating/materialIntensity/coatingIntensity"
    - "src/utils/(임시저장·공유 직렬화) — 레거시 단일 texture 하위호환 마이그레이션 로드"
    - "__tests__/textureRecipes.test.ts · captureComposite.test.ts — 2축·2겹·마이그레이션 회귀 확장"

material_coating_axes:  # 이 스펙의 핵심 구조 — 단일 8종을 두 축으로 재편
  material_axis:        # 재질 축(종이 자체: 색·톤·결) — 색을 바꾸는 축
    - id: original      # 원본(색변화 없음, 결 없음)
    - id: artpaper      # 미술용지 — 거친 캔버스/수채 종이 결. [강화 대상]
    - id: vintage       # 빈티지 — 빛바랜 세피아 + 노이즈 결(유지)
    - id: newspaper     # 흑백신문 — 흑백 + 거친 망점 결(유지)
  coating_axis:         # 코팅 축(위에 얹는 광택) — 재질 최종색 위에 blend
    - id: none          # 없음
    - id: gloss         # 유광(인화지 광택). [강화 대상]
    - id: hologram      # 홀로그램 — 무지개(유지)
    - id: metal         # 메탈릭 — 금속 포일(유지)
    - id: scodix        # 스코딕스 — 부분 UV 광택 스팟. [강화 대상]
  migration_map:        # 레거시 단일 texture → {material, coating} (c4 하위호환)
    original:   { material: original,  coating: none }
    none:       { material: original,  coating: gloss }
    hologram:   { material: original,  coating: hologram }
    metal:      { material: original,  coating: metal }
    scodix:     { material: original,  coating: scodix }
    artpaper:   { material: artpaper,  coating: none }
    vintage:    { material: vintage,   coating: none }
    newspaper:  { material: newspaper, coating: none }
  default_intensity:    # 축별 기본 강도(기존 값 재활용, 슬라이더 미조작 시)
    material: { artpaper: 0.6, vintage: 0.5, newspaper: 0.6 }   # original 무의미
    coating:  { gloss: 1.0, hologram: 0.7, metal: 0.7, scodix: 0.85 }  # none 무의미
  z_order: 포스터(재질 CSS filter 최종색) → 재질 결 오버레이 → 코팅 광택 오버레이 → 텍스트

