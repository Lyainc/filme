goal:
  statement: >-
    모바일 인플레이스 편집기에서 제목을 입력하는 사용자가, 키보드에 가리지 않는 충분한 결과 목록과
    동명·유사 제목을 판별할 수 있는 정보를 보고 원하는 영화를 확신을 갖고 선택할 수 있게 한다.
  clarity_score: 0.90

constraints:
  - id: c1
    type: technical
    description: >-
      추가 정보는 KOBIS searchMovieList 응답 안의 필드만 사용한다. 포스터 썸네일 등 외부
      API(TMDB/KMDb) 연동은 이번 스코프에서 제외.
    hard: true
    rationale: >-
      KOBIS는 포스터를 제공하지 않고(docs/KOBIS_API.md), CLAUDE.md에 TMDB 계획은 폐기로 기록돼 있다.
      반면 감독·장편단편·개봉상태·원제·제작연도는 이미 응답에 담겨 오므로 추가 호출 0회로 해결 가능.
  - id: c2
    type: technical
    description: 이번 개편 대상은 모바일 인플레이스 편집기(InPlaceFieldEditor의 aid 패널)뿐이다.
    hard: true
    rationale: 모바일을 먼저 안정화한 뒤 PC 레이아웃은 별도 개편으로 진행하기로 결정.
  - id: c3
    type: technical
    description: >-
      결과 패널은 visualViewport 기반 키보드 높이 위에 fixed로 얹히는 현재 구조 안에서 동작해야 하며,
      위치 계산에 rAF 루프를 도입하지 않는다.
    hard: true
    rationale: >-
      #354에서 rAF 루프를 금지하고 MutationObserver + ResizeObserver + visualViewport 이벤트
      1회 측정으로 확정한 구조. 이를 깨면 티켓 렌더 성능 회귀가 재발한다.
  - id: c4
    type: other
    description: 결과 카드는 DateSheet·RatingPicker 등 다른 aid 패널과 같은 카드·타이포·간격 토큰을 쓴다.
    hard: true
    rationale: 필드 편집기 전반의 톤앤매너 일관성이 사용자가 명시한 요구사항.
  - id: c5
    type: technical
    description: >-
      결과 목록에 키보드 유지 / 결과 표시 시 키보드 내림 중 어느 쪽을 택할지는 구현 단계에서
      시안을 보고 결정한다. 스펙은 두 방향 모두 허용한다.
    hard: false
    rationale: 공간 확보량과 검색어 재수정 마찰의 트레이드오프가 실제 시안 없이는 판단되지 않는다.
  - id: c6
    type: technical
    description: >-
      데스크톱/아코디언 경로(FieldEditorBody의 TitleSheet)는 이번에 건드리지 않되, 결과 행 마크업이
      두 벌로 갈라진 상태를 후속 PC 개편에서 반드시 수렴시킨다.
    hard: false
    rationale: >-
      #242의 onCompositionEnd 회귀가 정확히 이 복제-drift에서 나왔다. 지금은 의도적 유예이며,
      유예 사실 자체를 기록으로 남겨야 후속에서 놓치지 않는다.

success_criteria:
  - id: ac1
    description: 결과가 3건 이상일 때 최소 3건이 스크롤 없이, 키보드에 가리지 않고 한 화면에 보인다.
    verifiable: true
    measurable_via: 실기기(iOS Safari) 육안 확인 — 현재는 약 2행만 노출되고 3행째가 잘린다.
  - id: ac2
    description: >-
      동명·유사 제목이 섞인 검색어(예: "호프")에서 각 결과가 무엇인지 판별 가능하다 — 감독명,
      장편/단편/옴니버스 구분, 개봉 여부가 각 행에 드러난다.
    verifiable: true
    measurable_via: >-
      "호프" 검색 시 실제 응답(장편·나홍진·개봉 / 옴니버스·감독없음·기타)이 행 단위로 구분돼 보이는지 확인.
  - id: ac3
    description: 결과 패널이 다른 필드 편집기(DateSheet, RatingPicker)와 같은 카드·타이포·간격을 쓴다.
    verifiable: true
    measurable_via: 동일 토큰·클래스 사용 여부 코드 확인 + 필드 간 전환 시 시각적 이질감 없음.

