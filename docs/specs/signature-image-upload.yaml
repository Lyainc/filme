      각 무드가 prop으로 계속 넘긴다.
    hard: true
    rationale: >
      ChainStamp/FormatStamp가 이미 이 패턴(무드별 height/label/surface를 prop으로 받음)으로
      6개 무드에 배선되어 있어(#441/PR#485) 그대로 답습 — 설계 판단 없는 기계적 반복.
