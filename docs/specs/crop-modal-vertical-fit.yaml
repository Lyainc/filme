# build-spec extensions
spec_version: 1
created: 2026-07-21
target: 포스터 크롭 모달 세로 이미지 상하 잘림 수정 (ReactCrop 래퍼 max-height 미지정)
domain: tech
brownfield: true
refine_generation: 0
issue: 474

goal:
  statement: >
    ImageCropModal의 크롭 프레임에서 세로로 긴 이미지가 폭 기준으로만 축소돼 상하가
    잘려 보이는 문제를 없앤다. 크롭을 시작하기 전에 사용자가 업로드한 원본 전체가
    프레임 안에 항상 보여야 한다(contain). 이미지가 작게 렌더되는 데서 오는 드래그
    정밀도 저하는 이번 스코프 밖 — 잘림만 고친다.
  clarity_score: 0.85

constraints:
  - id: c1
    type: technical
    description: >
      [contain 보장] 크롭 프레임(`data-testid="crop-frame"`) 안에서 `<img>`의 렌더
      높이·폭이 프레임 내부 크기를 넘지 않아야 한다. 세로/가로/정사각 어느 자연비에서도
      원본 전체가 보이고 잘리는 픽셀이 없다.
    hard: true
    rationale: 이슈의 증상 자체. 크롭 이전에 원본을 온전히 못 보면 크롭 UI가 성립하지 않는다.
  - id: c2
    type: technical
    description: >
      [박스 정합] `.ReactCrop` 래퍼 박스가 렌더된 `<img>` 박스와 정확히 일치해야 한다
      (레터박스 여백이 `.ReactCrop` 안으로 들어가면 안 됨). ReactCrop의 crop selection은
      `.ReactCrop`(position:relative) 기준 절대배치인데, 크롭 좌표 환산
      (`handleConfirm`의 `naturalWidth / img.width`)은 `<img>` 박스 기준이라 두 박스가
      어긋나면 선택 영역과 실제 잘리는 영역이 달라진다.
    hard: true
    rationale: >
      "높이를 강제로 채우는" 방식(`.ReactCrop{height:100%}` 등)이 c1은 만족시키면서
      c2를 조용히 깨는 대표적 함정. 육안으로는 멀쩡해 보이고 결과물에서만 틀어진다.
  - id: c3
    type: technical
    description: >
      [퍼센트 높이 체인] `<img>` 인라인 `maxHeight:'100%'`만 손보는 수정은 원리적으로
      안 통한다. `.ReactCrop`은 `display:inline-block`이고 `crop-frame`(`display:flex`,
      `align-items:center`)의 stretch 안 되는 flex item이라 높이가 content-based(=indefinite)
      → 자식의 퍼센트 높이가 해소되지 않는다. 라이브러리 CSS(v11.1.2)는
      `.ReactCrop{max-width:100%}`뿐이고 `.ReactCrop__child-wrapper`와 `> img`는
      `max-height:inherit`이라, 위에서 **길이값**이 내려오지 않으면 체인 전체가 `none`이다.
    hard: true
    rationale: 실측 근거(900×1350 이미지, 프레임 640×488.5에서 img가 640×960로 렌더)와 일치.
  - id: c4
    type: technical
    description: >
      [단일 지점 수정] 수정은 `ImageCropModal` 한 곳(또는 그것이 스코프하는 CSS)에서
      끝나야 한다. 호출부는 6곳(`ImageUploader`, `FieldEditorBody`, `MobileEditorShell`,
      `FieldDrawer`, `InPlaceFieldEditor` 등)이 전부 같은 컴포넌트를 dynamic import 하므로
      포스터 크롭·로고 크롭이 동시에 고쳐져야 하고, 호출부별 분기 수정은 금지.
    hard: true
    rationale: 로고 크롭(자유 비율)도 같은 구조적 결함을 공유 — 루트에서 한 번 고친다.
  - id: c5
    type: technical
    description: >
      [전역 CSS 오염 금지] 전역 CSS로 고칠 경우 셀렉터는 크롭 프레임 하위로 스코프한다.
      `_app.tsx`가 `globals.css` → `ReactCrop.css` 순으로 import하므로 라이브러리 규칙이
      뒤에 오지만, 스코프 셀렉터는 이미 specificity가 높아 순서와 무관하게 이긴다 —
      `!important`로 덮지 말 것.
    hard: true
    rationale: import 순서에 의존하는 수정은 번들러 설정이 바뀌면 조용히 깨진다.
  - id: c6
    type: scope
    description: >
      [스코프 고정] 프레임 자체를 키우거나 줌/스케일 컨트롤을 부활시키는 건 이번 스코프 밖
      (오너 확정). 실제로 크롭 정밀도가 문제로 드러나면 그때 별건으로 재도입한다
      (줌 슬라이더는 #421에서 리사이즈 핸들로 대체돼 제거된 이력이 있음).
    hard: true
    rationale: 잘림은 결함이고 정밀도는 개선 — 한 PR에 섞으면 회귀 판정 기준이 흐려진다.
  - id: c7
    type: technical
    description: >
      [기존 동작 보존] `initCrop`의 100% 초기 크롭(#439 원본 손실 방지), 자연비 잠금
      (`mediaAspect`, #347/#420), "원본 비율 보존" 토글, stub 고정 경로는 그대로 유지한다.
      이번 수정은 렌더 크기 문제이지 크롭 계산 로직 문제가 아니다.
    hard: true
    rationale: 이 경로들은 각각 회귀로 한 번씩 아팠던 자리(#429·#439·#448).

success_criteria:
  - id: s1
    description: >
      브라우저 실측: `public/sample/fha3Us0NUvI6egMR5qeoLoyGakk.jpg`(900×1350)를 포스터
      크롭 모달에 올렸을 때 `<img>` computed height ≤ crop-frame clientHeight, 그리고
      상단 "DISCOVER IT AT Dolby Cinema" ~ 하단 "IN THEATERS APRIL 24"가 모두 보인다.
    measurable: true
  - id: s2
    description: >
      박스 정합 실측: `.ReactCrop`의 getBoundingClientRect가 `<img>`의 rect와 오차 1px
      이내로 일치한다(세로·가로 이미지 둘 다).
    measurable: true
  - id: s3
    description: >
      가로 이미지 회귀 없음: 가로로 긴 이미지(예: 1534×960 비율)는 지금처럼 폭 기준으로
      맞고 위아래 여백이 프레임 안에서 가운데 정렬된다.
    measurable: true
  - id: s4
    description: >
      로고 크롭(`aspect` 미전달 자유비) 경로에서도 세로로 긴 로고 이미지가 전체 보인다.
    measurable: true
  - id: s5
    description: >
      크롭 결과 정확성: contain 렌더 상태에서 크롭 영역을 잡고 적용했을 때 결과 이미지가
      선택 영역과 일치한다(좌표 환산이 새 렌더 크기에서도 맞는지 — c2의 결과 확인).
    measurable: true
  - id: s6
    description: >
      기존 테스트 유지: `bun test`(특히 `__tests__/logoCropFreeAspect.test.tsx`의
      data-aspect 계약)와 `bun run typecheck` 통과.
    measurable: true

verification:
  note: >
    happy-dom에는 레이아웃 엔진이 없어 s1~s3(computed height·rect)은 단위 테스트로 검증
    불가. 실제 브라우저(dev 서버 :3000)에서 샘플 이미지를 올려 computed style을 읽는
    수동/E2E 실측이 이번 건의 유일한 유효 검증이다. 단위 테스트는 s6(기존 계약 회귀)만 담당.

context:
  entry_point: src/components/ImageCropModal.tsx (크롭 프레임 = data-testid="crop-frame")
  library: react-image-crop 11.1.2 (CSS는 src/pages/_app.tsx에서 전역 import)
  callers:
    - src/components/ImageUploader.tsx
    - src/components/v2/FieldEditorBody.tsx
    - src/components/v2/MobileEditorShell.tsx
    - src/components/v2/FieldDrawer.tsx
    - src/components/v2/InPlaceFieldEditor.tsx
  measured:
    image: 900x1350
    crop_frame: 640x488.5
    react_crop_computed: { width: 640, height: 960, max_height: none }
    img_computed: { width: 640, height: 960 }
    clipped: 상하 각 ~235px

approach:
  decision: 구현자 판단에 위임 (오너 확정) — 아래 후보는 참고용, 결과 조건(c1·c2·s1~s5)만 강제.
  candidates:
    - id: a1
      name: CSS 컨테이너 쿼리 단위
      sketch: >
        크롭 프레임에 `container-type: size`를 주고 `.ReactCrop` / `.ReactCrop__child-wrapper` /
        그 안의 `img`에 `max-height: 100cqh`. cqh는 부모 높이의 definite 여부와 무관하게
        "가장 가까운 size container" 기준으로 풀리므로 c3의 퍼센트 체인 문제를 우회하고,
        `.ReactCrop`은 inline-block 그대로 이미지를 shrink-wrap 하므로 c2도 자연히 만족.
      cost: CSS 3~4줄
      risk: 브라우저 지원(Safari 16+ / Chrome 105+ / Firefox 110+ — 실사용 타깃엔 충분)
    - id: a2
      name: JS 실측 사이징
      sketch: >
        ResizeObserver로 프레임 크기를 재고 naturalWidth/naturalHeight로 contain 크기를 계산해
        `<img>`에 px 인라인 지정. CSS 엣지케이스와 무관하게 확정적. 프레임 리사이즈 시
        `completedCrop`(픽셀 좌표)이 이전 렌더 크기 기준이라는 기존 잠재 이슈가 더 자주
        드러날 수 있으니 리사이즈 때 크롭 재환산 필요 여부를 같이 판단할 것.
      cost: 약 15줄 + 리사이즈 배선
      risk: 상태·리렌더 배선이 늘어남

out_of_scope:
  - 크롭 프레임 높이 확대 / 모달 레이아웃 재배분
  - 줌·스케일 컨트롤 재도입 (#421에서 제거된 이력)
  - completedCrop 픽셀 좌표의 리사이즈 대응 (기존 잠재 이슈 — a2 선택 시에만 판단 대상)
