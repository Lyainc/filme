<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.scNoScroll::-webkit-scrollbar{width:0;height:0;}
.scThin::-webkit-scrollbar{height:0;}
.scInput::placeholder{color:#A7ADB6;opacity:.6;}
a{color:#B0423F;}a:hover{color:#9A3936;}
@keyframes scv5scan{0%{top:-14%;opacity:0}9%{opacity:.95}90%{opacity:.95}100%{top:100%;opacity:0}}
@keyframes scv5pop{0%{transform:scale(.5);opacity:0}55%{transform:scale(1.12);opacity:1}100%{transform:scale(1);opacity:1}}
</style>
</helmet>
<div style="width:390px;height:844px;position:relative;overflow:hidden;border-radius:46px;background:{{ C.bg }};color:{{ C.fg }};font-family:'Pretendard Variable',sans-serif;box-shadow:0 0 0 11px #0b0b0d, 0 40px 80px -30px rgba(0,0,0,.6);touch-action:manipulation;user-select:none;">

  <!-- camera cutout -->
  <sc-if value="{{ isIOS }}" hint-placeholder-val="{{ true }}"><div style="position:absolute;top:11px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:999px;background:#050505;z-index:40;pointer-events:none;"></div></sc-if>
  <sc-if value="{{ isAndroid }}" hint-placeholder-val="{{ false }}"><div style="position:absolute;top:15px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:999px;background:#050505;box-shadow:0 0 0 2px rgba(0,0,0,.28);z-index:40;pointer-events:none;"></div></sc-if>

  <!-- ambient backdrop — full-frame poster-glow echo behind status bar/header/canvas, on while editing -->
  <sc-if value="{{ ambientShown }}" hint-placeholder-val="{{ false }}"><div style="{{ ambientStyle }}"></div></sc-if>

  <!-- status bar -->
  <div style="height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 26px 0 30px;position:relative;z-index:30;">
    <span style="{{ clockStyle }}">9:41</span>
    <span style="display:flex;align-items:center;gap:7px;color:{{ chromeInk }};">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor" aria-hidden="true"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity=".35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M1 4.2C3 2.3 5.4 1.3 8 1.3s5 1 7 2.9M3.4 6.8C4.7 5.6 6.3 5 8 5s3.3.6 4.6 1.8M6 9.4c.6-.5 1.3-.8 2-.8s1.4.3 2 .8"/></svg>
      <span style="display:inline-flex;align-items:center;"><span style="width:22px;height:11px;border:1.4px solid currentColor;border-radius:3px;opacity:.9;position:relative;display:inline-block;"><span style="position:absolute;left:1.4px;top:1.4px;bottom:1.4px;width:14px;background:currentColor;border-radius:1px;"></span></span><span style="width:1.6px;height:4px;background:currentColor;border-radius:0 1px 1px 0;margin-left:1px;opacity:.6;"></span></span>
    </span>
  </div>

  <!-- header: brand · mini toolbar (undo/redo · list · maximize) · settings -->
  <header style="height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:relative;z-index:25;">
    <span style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <span style="width:30px;height:30px;border-radius:9px;background:#B0423F;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
        <span style="display:flex;transform:rotate(-16deg);"><dc-import name="Mark-ClapTix" ink="#FBF4EC" accent="#241C22" style="width:22px;height:22px;display:block;" hint-size="22px,22px"></dc-import></span>
      </span>
      <dc-import name="Wordmark-Filme" size="17" ink="{{ chromeInk }}" accent="#B0423F" me-emph="true" tittle="dot" style="display:block;" hint-size="76px,21px"></dc-import>
    </span>
    <span style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <button onClick="{{ openSettings }}" aria-label="편집 메뉴" style="{{ menuBtnStyle }}">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <sc-if value="{{ nextShown }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ goResult }}" aria-disabled="{{ nextDisabled }}" style="{{ headerNextStyle }}">다음<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
      </sc-if>
    </span>
  </header>

  <!-- ===== EDIT CANVAS ===== -->
  <div style="position:absolute;top:100px;left:0;right:0;bottom:0;overflow:hidden;z-index:10;">

    <!-- START: poster upload -->
    <div style="{{ dropzoneWrap }}">
      <div style="width:100%;max-width:300px;display:flex;flex-direction:column;align-items:center;gap:18px;">
        <button onClick="{{ posterUpload }}" style="width:230px;aspect-ratio:960/1477;border-radius:16px;border:2px dashed {{ C.borderStrong }};background:{{ C.surface }};color:{{ C.fg }};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;position:relative;overflow:hidden;">
          <span style="position:absolute;inset:0;background:radial-gradient(70% 45% at 50% 34%, {{ C.accentSoft }}, transparent 72%);pointer-events:none;"></span>
          <span style="width:62px;height:62px;border-radius:18px;background:#B0423F;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 30px -12px rgba(176,66,63,.7);position:relative;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M8 8l4-4 4 4M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          </span>
          <span style="position:relative;font-size:15.5px;font-weight:700;">포스터 업로드</span>
        </button>
        <button onClick="{{ ocrStart }}" style="display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 16px;border-radius:999px;border:1px solid {{ C.border }};background:{{ C.surface }};color:{{ C.fgMuted }};font-size:12.5px;font-weight:600;cursor:pointer;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          예매 스크린샷으로 자동 채우기
        </button>
      </div>
    </div>

    <!-- TICKET -->
    <div style="{{ ticketAreaStyle }}">
      <div onClick="{{ closeField }}" style="{{ editBackdropStyle }}"></div>
      <div ref="{{ setTicket }}" style="position:absolute;left:50%;top:20px;width:{{ ticketW }}px;transform-origin:50% 0;transform:{{ liftTransform }};transition:transform .34s cubic-bezier(.32,.72,0,1),width .3s ease;z-index:2;">
        <div style="position:relative;border-radius:15px;overflow:hidden;box-shadow:0 30px 60px -24px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.07), 0 0 50px -8px rgba(224,163,58,.14);aspect-ratio:{{ ticketAspect }};background:#0a0a0a;">
          <dc-import name="FilmeTicket-v4" data="{{ f }}" mood="{{ mood }}" tint="{{ tint }}" texture="{{ texture }}" poster-bright="{{ posterBright }}" comp-opacity="{{ compOpacity }}" show-ghosts="{{ ghostEff }}" hidden-keys="{{ hiddenKeys }}" logo-img="{{ logoImg }}" format-logo-img="{{ formatLogoImg }}" interactive="{{ true }}" active-key="{{ activeKeyVal }}" on-field="{{ openField }}" style="display:block;width:100%;height:100%;" hint-size="264px,406px"></dc-import>
        </div>
        <div ref="{{ setInpWrap }}" style="{{ inplaceInputStyle }}">
          <input key="inpedit-{{ editKey }}" class="scInput" value="{{ editVal }}" onInput="{{ onInput }}" autofocus="true" style="width:100%;height:100%;border:none;border-radius:6px;background:rgba(176,66,63,.12);color:transparent;caret-color:{{ C.accent }};font-size:14px;text-align:center;outline:none;font-family:'Pretendard Variable',sans-serif;" />
        </div>

        <!-- floating field toolbar — sits ON the ticket, next to the active field (#1) -->
        <div ref="{{ setBarWrap }}" style="{{ fieldBarBase }}">
          <button onClick="{{ prevField }}" aria-label="이전 항목" style="{{ barNavBtn }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
          <span style="width:1px;height:20px;background:{{ C.border }};flex-shrink:0;"></span>
          <sc-if value="{{ isLogoEdit }}" hint-placeholder-val="{{ false }}">
            <button onClick="{{ openLogoImage }}" aria-label="로고 이미지" style="{{ barChip }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="m21 15-5-5L5 21"/></svg>이미지</button>
          </sc-if>
          <button onClick="{{ toggleFieldVis }}" role="switch" aria-checked="{{ fieldVisible }}" aria-label="티켓 노출" style="{{ visChipStyle }}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="{{ visChipIconPath }}"/><sc-if value="{{ visEyeOpen }}" hint-placeholder-val="{{ false }}"><circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/></sc-if></svg>{{ visChipLabel }}</button>
          <button onClick="{{ nextField }}" aria-label="다음 항목" style="{{ barNavBtn }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
          <button onClick="{{ closeField }}" aria-label="완료" style="{{ barDone }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
        </div>
      </div>
    </div>

    <!-- ON-TICKET 항목: translucent right drawer (swipe →/tap outside to close, no X) -->
    <div onClick="{{ closeDrawer }}" style="{{ drawerBackdropStyle }}"></div>
    <div ref="{{ setDrawerEl }}" style="{{ sidebarStyle }}">
      <div onPointerDown="{{ onDrawerDown }}" onPointerMove="{{ onDrawerMove }}" onPointerUp="{{ onDrawerUp }}" onPointerCancel="{{ onDrawerUp }}" style="display:flex;flex-direction:column;height:100%;border-radius:20px;overflow:hidden;background:{{ drawerBg }};backdrop-filter:blur(13px) saturate(1.4);border:1px solid {{ drawerBorder }};box-shadow:-16px 0 44px -20px rgba(0,0,0,.5);touch-action:pan-y;">
        <button onClick="{{ fieldsOcr }}" style="{{ sidebarOcrBtn }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>티켓 자동 인식</button>
        <div class="scNoScroll" style="flex:1;overflow-y:auto;padding:8px;">
          <sc-for list="{{ fieldRows }}" as="r" hint-placeholder-count="8">
            <div style="{{ r.rowStyle }}">
              <button onClick="{{ r.tap }}" style="flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:1px;background:none;border:none;cursor:pointer;padding:7px 4px 7px 9px;text-align:left;min-width:0;">
                <span style="font-size:9.5px;font-weight:600;letter-spacing:.02em;color:{{ r.labelColor }};">{{ r.label }}</span>
                <span style="max-width:100%;font-size:12.5px;font-weight:600;color:{{ r.valueColor }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ r.valueText }}</span>
              </button>
              <sc-if value="{{ r.isLogo }}" hint-placeholder-val="{{ false }}">
                <button onClick="{{ r.uploadTap }}" aria-label="로고 이미지" style="width:28px;height:28px;border-radius:8px;border:none;background:none;color:{{ C.fgMuted }};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="m21 15-5-5L5 21"/></svg></button>
              </sc-if>
              <button onClick="{{ r.toggle }}" aria-label="노출 전환" style="{{ r.eyeBtnStyle }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="{{ r.eyeIcon }}"/><sc-if value="{{ r.eyeOpen }}" hint-placeholder-val="{{ false }}"><circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/></sc-if></svg></button>
            </div>
          </sc-for>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== FLOATING TOOLBAR MODULE (undo/redo · list · maximize · placement · hide) ===== -->
  <sc-if value="{{ toolbarShown }}" hint-placeholder-val="{{ false }}">
    <div ref="{{ setTbEl }}" style="{{ tbStyle }}">
      <sc-if value="{{ tbShowGrip }}" hint-placeholder-val="{{ false }}">
        <span onPointerDown="{{ onTbGripDown }}" onPointerMove="{{ onTbGripMove }}" onPointerUp="{{ onTbGripUp }}" onPointerCancel="{{ onTbGripUp }}" style="{{ tbGripStyle }}">{{ tbGripDots }}</span>
      </sc-if>
      <button onClick="{{ onUndo }}" aria-disabled="{{ undoDisabled }}" aria-label="실행 취소" style="{{ undoStyle }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
      <button onClick="{{ onRedo }}" aria-disabled="{{ redoDisabled }}" aria-label="다시 실행" style="{{ redoStyle }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg></button>
      <span style="{{ tbDividerStyle }}"></span>
      <button onClick="{{ openFields }}" aria-label="항목 목록" style="{{ miniListBtn }}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.6" cy="6" r="1.1"/><circle cx="3.6" cy="12" r="1.1"/><circle cx="3.6" cy="18" r="1.1"/></svg></button>
      <button onClick="{{ openZoom }}" aria-label="최대화" style="{{ miniBtn }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
      <span style="{{ tbDividerStyle }}"></span>
      <button onClick="{{ onTbGear }}" aria-label="툴바 배치 설정" style="{{ tbGearStyle }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button onClick="{{ onTbHide }}" aria-label="툴바 감추기" style="{{ miniBtn }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.53 13.53 0 0 0 2 12s3 8 10 8a9.74 9.74 0 0 0 5.39-1.61"/><path d="M2 2l20 20"/><path d="M9.53 9.53a3 3 0 0 0 4.24 4.24"/></svg></button>
    </div>
  </sc-if>

  <sc-if value="{{ tbMiniShown }}" hint-placeholder-val="{{ false }}">
    <button onPointerDown="{{ onTbMiniDown }}" onPointerMove="{{ onTbMiniMove }}" onPointerUp="{{ onTbMiniUp }}" onPointerCancel="{{ onTbMiniUp }}" aria-label="툴바 표시" style="{{ tbMiniStyle }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
  </sc-if>

  <div onClick="{{ onTbMenuBackdrop }}" style="{{ tbMenuBackdropStyle }}"></div>
  <div style="{{ tbMenuStyle }}">
    <div style="font-size:10px;font-weight:800;letter-spacing:.05em;color:{{ C.fgFaint }};padding:2px 6px 6px;">툴바 배치 선택</div>
    <sc-for list="{{ tbModeItems }}" as="m" hint-placeholder-count="4">
      <button onClick="{{ m.tap }}" style="{{ m.style }}"><span style="{{ m.dot }}"></span>{{ m.label }}</button>
    </sc-for>
  </div>

  <!-- ===== STYLING DOCK (2a) — dark immersive rail + detail, sits just under the poster ===== -->
  <div style="{{ dockStyle }}">
    <div style="{{ railRowStyle }}">
      <sc-for list="{{ tools }}" as="t" hint-placeholder-count="4">
        <button onClick="{{ t.tap }}" aria-label="{{ t.label }}" style="background:none;border:none;padding:2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;">
          <span style="{{ t.circle }}">{{ t.icon }}</span>
          <span style="{{ t.labelStyle }}">{{ t.label }}</span>
        </button>
      </sc-for>
    </div>

    <sc-if value="{{ dMood }}" hint-placeholder-val="{{ false }}">
      <div class="scThin" style="{{ moodRowStyle }}">
        <sc-for list="{{ moods }}" as="m" hint-placeholder-count="6">
          <button onClick="{{ m.tap }}" style="flex:none;display:flex;flex-direction:column;align-items:center;gap:7px;background:none;border:none;cursor:pointer;padding:0;">
            <span style="{{ m.thumbWrap }}">{{ m.thumb }}</span>
            <span style="font-size:11px;font-weight:700;color:{{ m.labelColor }};">{{ m.name }}</span>
          </button>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ dColortone }}" hint-placeholder-val="{{ false }}">
      <div style="padding:4px 16px 18px;display:flex;flex-direction:column;gap:14px;">
        <sc-if value="{{ colorFree }}" hint-placeholder-val="{{ true }}">
          <div class="scThin" style="display:flex;gap:12px;overflow-x:auto;padding:2px 0;">
            <sc-for list="{{ inkColors }}" as="c" hint-placeholder-count="5">
              <button onClick="{{ c.tap }}" aria-label="{{ c.name }}" style="background:none;border:none;cursor:pointer;padding:0;flex:none;"><span style="{{ c.dot }}"></span></button>
            </sc-for>
          </div>
        </sc-if>
      </div>
    </sc-if>

    <sc-if value="{{ dOpacity }}" hint-placeholder-val="{{ false }}">
      <div style="padding:4px 16px 20px;display:flex;flex-direction:column;gap:14px;">
        <div style="display:flex;align-items:center;gap:11px;">
          <span style="font-size:11.5px;color:rgba(255,255,255,.62);width:62px;flex-shrink:0;">포스터 밝기</span>
          <input type="range" min="0" max="100" value="{{ posterBright }}" onInput="{{ onBright }}" style="flex:1;height:22px;accent-color:#B0423F;cursor:pointer;" />
          <span style="font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:#fff;width:34px;text-align:right;flex-shrink:0;">{{ brightLabel }}</span>
        </div>
        <div style="display:flex;align-items:center;gap:11px;">
          <span style="font-size:11.5px;color:rgba(255,255,255,.62);width:62px;flex-shrink:0;">투명도</span>
          <input type="range" min="0" max="100" value="{{ compOpacity }}" onInput="{{ onOpacity }}" style="flex:1;height:22px;accent-color:#B0423F;cursor:pointer;" />
          <span style="font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:#fff;width:34px;text-align:right;flex-shrink:0;">{{ opacityLabel }}</span>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ dTexture }}" hint-placeholder-val="{{ false }}">
      <div class="scThin" style="{{ texRowStyle }}">
        <sc-for list="{{ textures }}" as="t" hint-placeholder-count="8">
          <button onClick="{{ t.tap }}" style="flex:none;display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer;padding:0;">

      // permalink
      permaUrl:'filme.app/t/'+this._pid, permaFieldBorder: s.linkCopied?C.ok:'rgba(255,255,255,.16)',

      // zoom / maximize
      openZoom:()=>this.setState({zoomOpen:true, zoomScale:1, zoomTx:0, zoomTy:0}),

      zoomBackdropClick:()=>{ if(this._zGestured){ this._zGestured=false; return; } this.setState({zoomOpen:false, zoomScale:1, zoomTx:0, zoomTy:0}); },
      stopZoomClick:(e)=>{ e.stopPropagation(); },
      onZPointerDown:(e)=>{ if(!this.state.zoomOpen) return; this._zpts=this._zpts||{}; this._zpts[e.pointerId]={x:e.clientX,y:e.clientY}; const ids=Object.keys(this._zpts); if(ids.length===2){ const a=this._zpts[ids[0]], b=this._zpts[ids[1]]; this._zpinch={d:Math.hypot(a.x-b.x,a.y-b.y)||1, s:this.state.zoomScale}; this.setState({zGesturing:true}); } else if(ids.length===1 && this.state.zoomScale>1.02){ this._zpan={x:e.clientX,y:e.clientY,tx:this.state.zoomTx,ty:this.state.zoomTy}; } },
      onZPointerMove:(e)=>{ if(!this._zpts||!this._zpts[e.pointerId]) return; this._zpts[e.pointerId]={x:e.clientX,y:e.clientY}; const ids=Object.keys(this._zpts); if(ids.length>=2 && this._zpinch){ const a=this._zpts[ids[0]], b=this._zpts[ids[1]]; const d=Math.hypot(a.x-b.x,a.y-b.y); const sc=Math.max(1,Math.min(4, this._zpinch.s * d/this._zpinch.d)); this._zGestured=true; this.setState({zoomScale:sc}); } else if(ids.length===1 && this._zpan){ this._zGestured=true; this.setState({zoomTx:this._zpan.tx+(e.clientX-this._zpan.x), zoomTy:this._zpan.ty+(e.clientY-this._zpan.y)}); } },
      onZPointerUp:(e)=>{ if(this._zpts) delete this._zpts[e.pointerId]; const n=this._zpts?Object.keys(this._zpts).length:0; if(n<2){ this._zpinch=null; this.setState({zGesturing:false}); } if(n===0){ this._zpan=null; if(this.state.zoomScale<=1.02 && (this.state.zoomTx||this.state.zoomTy)) this.setState({zoomTx:0,zoomTy:0}); } },

  componentDidMount(){
    this._lastSnap=this._snap();
    this.setState({hist:[this._lastSnap], histAt:0});
    const tp=this._tbDefPos(this.state.tbOrient, this.state.tbPlace);
    this.setState({tbX:tp.x, tbY:tp.y});
    try{ const raw=localStorage.getItem('filmeDraftV6'); if(raw){ const d=JSON.parse(raw); if(d&&d.at) this.setState({draftAt:d.at}); } }catch(_){}
    this._raf=requestAnimationFrame(this._tick.bind(this));
    this._rzMove=(e)=>{ if(!this._rz) return; const s=this.state; const nw=Math.max(40,Math.min(280-s.cropX,this._rz.ow+(e.clientX-this._rz.x))); const nh=Math.max(28,Math.min(172-s.cropY,this._rz.oh+(e.clientY-this._rz.y))); this.setState({cropW:nw,cropH:nh}); };
    window.addEventListener('pointermove',this._rzMove);
    const demo=(this.props||{}).demo||'';
    if(demo==='start') this.setState({hasPoster:false, screen:'edit'});
    else if(demo==='result') this.setState({hasPoster:true, screen:'result', editKey:null});
    else if(demo==='fields') this.setState({hasPoster:true, screen:'edit', designTool:'fields'});
    else if(this.editOrder.includes(demo)){ this._ekey=demo; this.setState({hasPoster:true, screen:'edit', editKey:demo}); setTimeout(()=>this._afterField(demo),320); }
    else this.setState({hasPoster:true});
  }
  componentDidUpdate(){
    this._place();
    if(this._restoring) return;
    const snap=this._snap();
    if(snap!==this._lastSnap){
      this._lastSnap=snap;
      clearTimeout(this._histT);
      this._histT=setTimeout(()=>{
        this.setState(st=>{ const base=st.hist.slice(0,st.histAt+1); base.push(snap); const capped=base.slice(-80); return {hist:capped, histAt:capped.length-1}; });
      },350);
    }
  }
  componentWillUnmount(){ if(this._raf) cancelAnimationFrame(this._raf); if(this._rzMove) window.removeEventListener('pointermove',this._rzMove); clearTimeout(this._t); clearTimeout(this._mt1); clearTimeout(this._mt2); clearTimeout(this._mt3); clearTimeout(this._pr); clearTimeout(this._pr2); clearTimeout(this._histT); clearTimeout(this._ca); }
