<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
</helmet>
<div style="{{ rowStyle }}"><span>f</span><span style="{{ iWrapStyle }}"><span>{{ iChar }}</span><sc-if value="{{ showTittle }}" hint-placeholder-val="{{ true }}"><span style="{{ tittleStyle }}"></span></sc-if></span><span>l</span><span style="{{ meStyle }}">me</span></div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:180},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:96,&quot;min&quot;:16,&quot;max&quot;:240,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;},&quot;ink&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#241C22&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#B0423F&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;meEmph&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;tittle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;frame&quot;,&quot;play&quot;,&quot;dot&quot;],&quot;default&quot;:&quot;frame&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const size = Number(this.props.size ?? 72);
    const ink = this.props.ink ?? '#241C22';
    const accent = this.props.accent ?? '#B0423F';
    const meEmph = this.props.meEmph ?? false;
    const shape = this.props.tittle ?? 'frame'; // frame | play | dot

    const tittle = {
      position: 'absolute', left: '50%', bottom: '0.72em',
      width: '0.2em', height: '0.2em',
      transform: 'translateX(-50%)',
      background: accent,
    };
    if (shape === 'dot') tittle.borderRadius = '50%';
    else if (shape === 'frame') tittle.borderRadius = '0.045em';
    else if (shape === 'play') {
      tittle.width = '0.2em'; tittle.height = '0.2em';
      tittle.background = accent;
      tittle.clipPath = 'polygon(8% 0%, 8% 100%, 100% 50%)';
      tittle.borderRadius = '0';
    }

    const showTittle = size >= 18;
    return {
      showTittle,
      iChar: showTittle ? '\u0131' : 'i', // dotless i carries the custom tittle; tiny sizes fall back to a normal i
      rowStyle: {
        display: 'inline-flex', alignItems: 'baseline',
        fontFamily: "'Nunito', sans-serif", fontWeight: 900,
        fontSize: size + 'px', lineHeight: 1, color: ink,
        letterSpacing: '-0.012em', whiteSpace: 'nowrap',
      },
      iWrapStyle: { position: 'relative', display: 'inline-block' },
      tittleStyle: tittle,
      meStyle: { color: meEmph ? accent : 'inherit' },
    };
  }
}
</script>
</body>
</html>
